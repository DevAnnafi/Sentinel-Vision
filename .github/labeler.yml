backend:
  - changed-files:
      - any-glob-to-any-file: "backend/**"

frontend:
  - changed-files:
      - any-glob-to-any-file: "frontend/**"

ci/cd:
  - changed-files:
      - any-glob-to-any-file: ".github/**"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
          - "docs/**"

docker:
  - changed-files:
      - any-glob-to-any-file:
          - "**/Dockerfile"
          - "docker-compose*.yml"

ml-model:
  - changed-files:
      - any-glob-to-any-file:
          - "backend/core/detector.py"
          - "backend/tasks/inference.py"
          - "backend/weights/**"